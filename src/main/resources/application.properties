spring.application.name=eventos
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.threads.virtual.enabled=true


jwt.secret=EstaEsUnaClaveSecretaSuperLargaYSeguraParaPoderFirmarLosTokensDeEventos1234567890
#Expirara en 10 minutos el jwt
jwt.expiration=600000 


springdoc.swagger-ui.operationsSorter=alpha


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:gestioneventosdb
spring.datasource.username=sa
spring.datasource.password=admin1234
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.naming.physical-strrategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl